<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar-X20 Pro Control</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 15px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #2563eb; }
        .status { margin-top: 15px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>لوحة التحكم 🛰️</h2>
        <p>ضع رابط المقطع (تيك توك، انستا..)</p>
        <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/...">
        <button onclick="saveLink()">تحديث الرابط الملغم</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        async function saveLink() {
            const url = document.getElementById('videoUrl').value;
            const status = document.getElementById('status');
            if(!url) return alert("ضع الرابط أولاً!");

            status.innerText = "جاري الحفظ...";
            // هنا نرسل الرابط إلى الـ API ليتم تخزينه
            try {
                const response = await fetch('/api/index', {
                    method: 'POST',
                    body: JSON.stringify({ targetUrl: url }),
                    headers: { 'Content-Type': 'application/json' }
                });
                if(response.ok) status.innerText = "✅ تم تحديث الرابط بنجاح!";
                else status.innerText = "❌ فشل التحديث";
            } catch (e) {
                status.innerText = "⚠️ خطأ في الاتصال";
            }
        }
    </script>
</body>
</html>
