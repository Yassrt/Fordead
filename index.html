<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar-X20 Control</title>
    <style>
        body { font-family: sans-serif; background: #070b14; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111827; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; border: 1px solid #1f2937; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; background: #070b14; color: #10b981; text-align: center; font-size: 16px; }
        button { background: #10b981; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        #linkOutput { margin-top: 20px; display: none; word-break: break-all; background: #070b14; padding: 15px; border-radius: 10px; color: #fbbf24; border: 1px dashed #fbbf24; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🛰️ Radar-X20 Control</h2>
        <input type="text" id="target" placeholder="ضع رابط التيك توك هنا">
        <button onclick="update()">تشفير وتحديث الرابط</button>
        <div id="linkOutput" onclick="copy()"></div>
    </div>

    <script>
        async function update() {
            const url = document.getElementById('target').value;
            if(!url) return;
            const res = await fetch('/api/index', {
                method: 'POST',
                body: JSON.stringify({ url: url }),
                headers: { 'Content-Type': 'application/json' }
            });
            if(res.ok) {
                const final = window.location.origin + "/api/index";
                document.getElementById('linkOutput').style.display = 'block';
                document.getElementById('linkOutput').innerText = final;
                alert("تم التحديث! انسخ الرابط الآن");
            }
        }
    </script>
</body>
</html>
