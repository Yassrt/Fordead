<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشروعي</title>
    <script>
        // 1. دالة حفظ الكوكيز بشكل آمن (تحل مشكلة "محمي")
        function setSecureCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            // السطر السحري لحل مشكلة الحماية في المتصفحات
            document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=None; Secure";
            alert("تم حفظ البيانات بنجاح!");
        }

        // 2. دالة جلب الكوكيز (للتأكد أنها ليست فارغة)
        function getMyCookie() {
            let name = "my_data=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let ca = decodedCookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') { c = c.substring(1); }
                if (c.indexOf(name) == 0) {
                    alert("البيانات الموجودة هي: " + c.substring(name.length, c.length));
                    return;
                }
            }
            alert("الكوكيز فارغ حالياً!");
        }
    </script>
</head>
<body>

    <h1>مرحباً بك في موقعي</h1>
    <p>استخدم الأزرار بالأسفل لتجربة الكوكيز:</p>

    <button onclick="setSecureCookie('my_data', 'Hello_World', 7)">حفظ كوكيز تجريبي</button>

    <button onclick="getMyCookie()">عرض الكوكيز المخزن</button>

</body>
</html>
