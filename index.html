<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSSRY - SERVICES</title>
    <style>
        :root { --main-green: #00ff00; --glow-red: #ff0000; }
        body { background-color: #020202; color: white; text-align: center; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; direction: rtl; }
        
        /* النجوم والضبابية */
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: black; }
        .star { position: absolute; background-color: white; border-radius: 50%; animation: moveStar linear infinite; opacity: 0.8; box-shadow: 0 0 3px white; }
        @keyframes moveStar { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
        #blur-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; backdrop-filter: blur(2px); background: rgba(0,0,0,0.4); }

        /* الهوم */
        #landing-page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .top-brand { font-size: 1.5rem; font-weight: bold; color: white; letter-spacing: 5px; margin-bottom: 5px; opacity: 0.9; }
        .hero-title { 
            font-size: 2.2rem; font-weight: bold; color: white; 
            margin-bottom: 35px; 
            text-shadow: 0 0 8px var(--main-green); /* توهج مخفف */
        }
        .start-btn { 
            padding: 14px 60px; background: transparent; border: 1px solid var(--main-green); 
            color: var(--main-green); border-radius: 50px; font-size: 20px; cursor: pointer; transition: 0.4s; 
        }

        /* شعار ALSSRY الداخلي - واضح ومقروء */
        .inner-logo { 
            font-size: 45px; font-weight: 900; color: white; letter-spacing: 8px;
            text-shadow: 3px 3px 0px var(--glow-red), -3px -3px 0px var(--main-green);
            margin: 20px 0; display: block;
        }

        /* واجهة الخدمات */
        #tools-interface { padding: 20px; z-index: 10; display: none; }
        .law-text { color: #ff4444; font-family: monospace; font-size: 12px; margin-bottom: 20px; }
        .glass-btn { 
            width: 90%; padding: 16px; margin: 10px 0; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(0, 255, 0, 0.3); color: var(--main-green); border-radius: 12px; 
            font-weight: bold; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .glass-btn:hover { border-color: var(--main-green); box-shadow: 0 0 15px var(--main-green); }

        input { 
            width: 85%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333;
            background: rgba(255,255,255,0.05); color: white; text-align: center;
        }

        #progress-box { margin-top: 20px; border: 1px solid var(--main-green); padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.6); }
        #counter { font-size: 32px; font-weight: bold; color: var(--main-green); }

        /* سجل العمليات المتلاشي */
        #live-status { position: fixed; bottom: 20px; width: 100%; text-align: center; }
        .status-msg { font-size: 12px; color: #aaa; transition: opacity 1.5s ease; opacity: 1; }
        .online-count { font-size: 11px; color: var(--main-green); margin-bottom: 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="starfield"></div>
    <div id="blur-overlay"></div>

    <div id="landing-page">
        <div class="top-brand">ALSSRY</div>
        <h1 class="hero-title">خدمات سوشال ميديا</h1>
        <button class="start-btn" onclick="openTools()">بدء</button>
    </div>

    <div id="tools-interface">
        <div class="inner-logo">ALSSRY</div>
        <div class="law-text">NOT EVERYWHERE THERE IS A LAW</div>
        
        <div id="main-menu">
            <button class="glass-btn" onclick="showPlat('boost')">1- قسم الرشق 🚀</button>
            <button class="glass-btn" onclick="showPlat('spam')">2- قسم الإسبام ⚔️</button>
        </div>

        <div id="platform-menu" class="hidden">
            <button class="glass-btn" onclick="selectPlat('TikTok')">تيك توك</button>
            <button class="glass-btn" onclick="selectPlat('Instagram')">انستقرام</button>
            <button class="glass-btn" style="color:red; border-color:red;" onclick="goBack('main-menu')">رجوع</button>
        </div>

        <div id="service-menu" class="hidden">
            <div id="boost-btns" class="hidden">
                <button class="glass-btn" onclick="openInput('متابعين', 'يوزر الحساب (@)', 5000)">متابعين</button>
                <button class="glass-btn" onclick="openInput('لايكات', 'رابط المقطع (http)', 5000)">لايكات</button>
                <button class="glass-btn" onclick="openInput('مشاهدات', 'رابط المقطع (http)', 5000)">مشاهدات</button>
            </div>
            <button id="spam-btn" class="glass-btn hidden" onclick="openInput('إسبام بلاغات', 'يوزر الحساب (@)', 300)">بدء الإسبام</button>
            <button class="glass-btn" style="color:red; border-color:red;" onclick="goBack('platform-menu')">رجوع</button>
        </div>

        <div id="final-step" class="hidden">
            <h3 id="display-title" style="color:var(--main-green)"></h3>
            <input type="text" id="target-id">
            <input type="number" id="target-count">
            <button class="glass-btn" style="background:var(--main-green); color:black;" onclick="startHacking()">تأكيد التنفيذ ✅</button>
            
            <div id="progress-box" class="hidden">
                <div style="font-size:12px; color:#ccc;">جاري إرسال الدفعة...</div>
                <div id="counter">0</div>
            </div>
        </div>

        <div id="live-status">
            <div class="online-count">🟢 المتصلون الآن: <span id="user-count">...</span></div>
            <div id="status-text" class="status-msg">يتم فحص الثغرات الحالية...</div>
        </div>
    </div>

    <script>
        let mode="", plat="", service="", maxVal=5000;
        
        function createStars() {
            const container = document.getElementById('starfield');
            for(let i=0; i<50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random()*3+'px';
                star.style.left = Math.random()*100+'vw';
                star.style.animationDuration = Math.random()*8+4+'s';
                container.appendChild(star);
            }
        }
        createStars();

        function openTools() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('tools-interface').style.display = 'block';
            updateOnlineCount();
            startLogs();
        }

        function updateOnlineCount() {
            const el = document.getElementById('user-count');
            setInterval(() => {
                el.innerText = Math.floor(Math.random() * (368 - 100 + 1)) + 100;
            }, 3000);
            el.innerText = Math.floor(Math.random() * (368 - 100 + 1)) + 100;
        }

        function startLogs() {
            const logs = ["تم رشق 1.2k متابع لـ s***", "بدء عملية إسبام مكثف ✅", "تحديث سيرفرات تيك توك...", "اكتمال رشق لايكات لـ m***"];
            let i = 0;
            const el = document.getElementById('status-text');
            setInterval(() => {
                el.style.opacity = 0;
                setTimeout(() => {
                    el.innerText = logs[i];
                    el.style.opacity = 1;
                    i = (i + 1) % logs.length;
                }, 1500);
            }, 6000);
        }

        function showPlat(m) { mode=m; goBack('platform-menu'); }
        function selectPlat(p) { plat=p; goBack('service-menu'); document.getElementById('boost-btns').className = (mode==='boost') ? "" : "hidden"; document.getElementById('spam-btn').className = (mode==='spam') ? "glass-btn" : "hidden"; }
        function openInput(s, ph, max) { service=s; maxVal=max; goBack('final-step'); document.getElementById('display-title').innerText = plat + " - " + s; document.getElementById('target-id').placeholder = ph; document.getElementById('target-count').placeholder = "الحد: "+max; }
        function goBack(id) { document.querySelectorAll('#main-menu, #platform-menu, #service-menu, #final-step').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        function startHacking() {
            const v = document.getElementById('target-id').value;
            const c = parseInt(document.getElementById('target-count').value);
            if(!v || !c) return alert("أدخل البيانات");
            document.getElementById('progress-box').classList.remove('hidden');
            let cur = 0;
            let inv = setInterval(() => {
                if(cur >= c) { clearInterval(inv); alert("تم الإرسال بنجاح!"); location.reload(); }
                else { cur += Math.floor(Math.random()*15)+1; if(cur > c) cur = c; document.getElementById('counter').innerText = cur; }
            }, 80);
            fetch('/api/index', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({service: service, target: v, count: c}) });
        }
    </script>
</body>
</html>
